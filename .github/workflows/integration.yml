name: Integration Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  sure-integration:
    runs-on: ubuntu-latest
    env:
      SURE_BASE_URL: http://localhost:3000
      SURE_API_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      SURE_ACCOUNT_DOMAIN: test-bank
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Sure
        run: docker compose -f test/compose.sure.yml up -d

      - name: Wait for Sure to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/up > /dev/null; then
              echo "Sure is up"; exit 0
            fi
            sleep 5
          done
          echo "Sure did not become ready in time"
          docker compose -f test/compose.sure.yml logs web
          exit 1

      - name: Seed Sure
        run: |
          docker compose -f test/compose.sure.yml exec -T \
            -e SEED_API_KEY="$SURE_API_KEY" \
            -e SEED_ACCOUNT_DOMAIN="$SURE_ACCOUNT_DOMAIN" \
            web bin/rails runner - < test/sure-seed.rb

      - name: Run integration tests
        run: pnpm test:integration

      - name: Dump Sure logs on failure
        if: failure()
        run: docker compose -f test/compose.sure.yml logs

      - name: Teardown
        if: always()
        run: docker compose -f test/compose.sure.yml down -v
