name: Build and Release on Version Change

on:
  push:
    branches: [ main, master ]
    paths:
      - 'package.json'

jobs:
  check-version-and-release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    # Expose values to downstream jobs via `needs.check-version-and-release.outputs.*`
    outputs:
      version_changed: ${{ steps.version_check.outputs.version_changed }}
      current_version: ${{ steps.current_version.outputs.current_version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Get previous version
        id: previous_version
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "previous_version=${LATEST_TAG#v}" >> $GITHUB_OUTPUT

      - name: Get current version
        id: current_version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

      - name: Check if version changed
        id: version_check
        run: |
          if [ "${{ steps.previous_version.outputs.previous_version }}" != "${{ steps.current_version.outputs.current_version }}" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "Version changed from ${{ steps.previous_version.outputs.previous_version }} to ${{ steps.current_version.outputs.current_version }}"
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged"
          fi

      - name: Create Git Tag
        if: steps.version_check.outputs.version_changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "v${{ steps.current_version.outputs.current_version }}" -m "Release v${{ steps.current_version.outputs.current_version }}"
          git push origin "v${{ steps.current_version.outputs.current_version }}"

  build-and-release:
    runs-on: ubuntu-latest
    needs: check-version-and-release
    if: needs.check-version-and-release.outputs.version_changed == 'true'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          ref: "v${{ needs.check-version-and-release.outputs.current_version }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Rename build artifact
        run: mv build.zip "bank-universal-sync-v${{ needs.check-version-and-release.outputs.current_version }}.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version-and-release.outputs.current_version }}
          name: Release v${{ needs.check-version-and-release.outputs.current_version }}
          body: |
            Automated release for version ${{ needs.check-version-and-release.outputs.current_version }}

            Chrome extension for universal bank data export.
          draft: false
          prerelease: false
          files: bank-universal-sync-v${{ needs.check-version-and-release.outputs.current_version }}.zip
